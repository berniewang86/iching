<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- 背景 -->
  <rect width="512" height="512" rx="115" fill="#1a1410"/>

  <!-- 外圈光晕 -->
  <circle cx="256" cy="256" r="226" fill="none" stroke="#c9a84c" stroke-width="1.5" opacity="0.15"/>
  <circle cx="256" cy="256" r="215" fill="none" stroke="#c9a84c" stroke-width="2.5" opacity="0.25"/>

  <!-- 八卦方向线 -->
  <g stroke="#c9a84c" stroke-width="1.2" opacity="0.2">
    <line x1="256" y1="30"  x2="256" y2="75"/>
    <line x1="256" y1="437" x2="256" y2="482"/>
    <line x1="30"  y1="256" x2="75"  y2="256"/>
    <line x1="437" y1="256" x2="482" y2="256"/>
    <line x1="86"  y1="86"  x2="118" y2="118"/>
    <line x1="394" y1="394" x2="426" y2="426"/>
    <line x1="426" y1="86"  x2="394" y2="118"/>
    <line x1="118" y1="394" x2="86"  y2="426"/>
  </g>

  <!-- 太极图底圆 -->
  <circle cx="256" cy="256" r="170" fill="#231d16"/>

  <!-- 太极阳仪（金色S形） -->
  <path d="M256,86 a85,85 0 0,1 0,170 a85,85 0 0,0 0,170 a170,170 0 0,1 0,-340z" fill="#c9a84c"/>

  <!-- 轮廓 -->
  <circle cx="256" cy="256" r="170" fill="none" stroke="#c9a84c" stroke-width="3" opacity="0.55"/>

  <!-- 阴中阳（下方金点） -->
  <circle cx="256" cy="341" r="30" fill="#c9a84c"/>

  <!-- 阳中阴（上方暗点） -->
  <circle cx="256" cy="171" r="30" fill="#231d16"/>

  <!-- 底部装饰线 -->
  <rect x="186" y="432" width="140" height="2" rx="1" fill="#c9a84c" opacity="0.35"/>
</svg>
